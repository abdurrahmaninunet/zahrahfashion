services:
  postgres:
    image: postgres:16-alpine
    container_name: zahrah-postgres
    environment:
      POSTGRES_USER: zahrah
      POSTGRES_PASSWORD: zahrah_dev
      POSTGRES_DB: zahrah
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zahrah"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zahrah-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
