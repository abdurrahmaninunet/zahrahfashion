name: Build & push images to ECR

# Manual trigger (click "Run workflow" in the Actions tab). To auto-build on every
# push to main, uncomment the `push:` block below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        app: [api, storefront, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push zahrah-${{ matrix.app }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Public Google client id is baked into the storefront bundle at build time.
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          IMAGE="$REGISTRY/zahrah-${{ matrix.app }}"
          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="$NEXT_PUBLIC_GOOGLE_CLIENT_ID" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
